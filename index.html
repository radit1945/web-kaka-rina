<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pencerahan Akhir Bulan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="money-background"></div>

  <div class="container">
    <h1 id="typing-text"></h1>

    <p class="subtitle">
      Padahal baru kemarin rasanya kaya raya, sekarang dompet tinggal kenangan.
    </p>

    <div class="meter-box">
      <p>Tingkat Kesedihan Akhir Bulan</p>
      <div class="meter">
        <div class="meter-fill"></div>
      </div>
    </div>

    <img
      src="https://cdn-icons-png.flaticon.com/512/2331/2331941.png"
      alt="Dompet kosong"
      class="wallet-img"
    >

    <div class="button-group">
      <button id="yesBtn">Kasih Uang Sekarang</button>
      <button id="noBtn">Nanti Ya</button>
    </div>

    <p id="resultText"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
